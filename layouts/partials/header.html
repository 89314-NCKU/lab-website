<div style="text-align: center; padding: 20px 0;">
    <a href="{{ "" | absLangURL }}">
        <img src="{{ "/images/IMG_0372.jpeg" | relURL }}" alt="Lab Logo" style="max-height: 120px; width: auto;">
    </a>
</div>

<header class="header">
    <nav class="nav">
        <div class="logo">
            <a href="{{ "" | absLangURL }}" accesskey="h" title="{{ site.Title }} (Alt + H)">
                {{- site.Title -}}
            </a>
        </div>
        <ul id="menu">
            {{- range site.Menus.main }}
            <li>
                <a href="{{ .URL | relLangURL }}" title="{{ .Name }}">
                    <span>{{ .Name }}</span>
                </a>
            </li>
            {{- end }}
        </ul>
    </nav>
</header>
